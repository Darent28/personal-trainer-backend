# H2 in-memory database for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true

# Disable SQL init scripts (they use PostgreSQL-specific syntax)
spring.sql.init.mode=never

# JWT — secret must be >= 32 chars for HS256
jwt.secret=test-secret-key-for-unit-testing-only-not-prod
jwt.expiration=86400000

# Mail (disabled for tests)
spring.mail.host=localhost
spring.mail.port=25
spring.mail.from=test@test.com

# App properties
app.base-url=http://localhost:8080
app.cron-secret=test-cron-secret
app.confirmation-token-expiry-hours=24
