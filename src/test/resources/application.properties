spring.application.name=personal-trainer

# Server configuration
server.port=8080

# Default datasource (in-memory H2 for local development)
spring.datasource.url=jdbc:h2:mem:personal_trainer;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
