# Load environment variables from .env (optional)
spring.config.import=optional:dotenv:

spring.application.name=personal-trainer

# Server configuration
server.port=${SERVER_PORT:8080}

# Datasource — all connection details via environment variables
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.defer-datasource-initialization=true

# Seed data
spring.sql.init.mode=always

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Mail (SMTP)
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.from=${MAIL_FROM}

# Email confirmation
app.base-url=${APP_BASE_URL:http://localhost:8080}
app.cron-secret=${CRON_SECRET}
app.confirmation-token-expiry-hours=${CONFIRMATION_TOKEN_EXPIRY_HOURS:24}
