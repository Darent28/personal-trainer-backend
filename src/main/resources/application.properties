# Load environment variables from .env (optional)
spring.config.import=optional:dotenv:

spring.application.name=personal-trainer

# Server configuration
server.port=8080

# Datasource — all connection details via environment variables
#spring.datasource.url=jdbc:postgresql://localhost:5433/personal-trainer
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.defer-datasource-initialization=true

# Seed data
spring.sql.init.mode=always
